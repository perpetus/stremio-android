name: Android CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Compile and assemble debug
        run: ./gradlew :app:compileDebugKotlin :app:assembleDebug --warning-mode all

      - name: Verify debug APK outputs
        run: python .github/scripts/verify-apk-outputs.py app/build/outputs/apk/debug armeabi-v7a arm64-v8a x86 x86_64 universal

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: stremio-mobile-debug-apks
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
