name: Android PR Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wrapper-validation:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

  unit-tests:
    name: Compile and Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Compile and run JVM tests
        run: ./gradlew :app:compileDebugKotlin :app:testDebugUnitTest --warning-mode all
