name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_name:
        description: Version name to publish for a manual release
        required: false

permissions:
  contents: write

jobs:
  build-stream-server:
    name: Build Stream Server Native Libraries
    runs-on: ubuntu-latest

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout stream-server
        uses: actions/checkout@v4
        with:
          repository: perpetus/stream-server
          path: stream-server

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL);
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN);

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed-arm64
            vcpkg_installed-x64
          key: android-vcpkg-split-${{ hashFiles('stream-server/vcpkg.json') }}
          restore-keys: |
            android-vcpkg-split-

      - name: Create Android triplets
        run: |
          mkdir -p stream-server/triplets
          cat > stream-server/triplets/arm64-android.cmake << 'EOF'
          set(VCPKG_TARGET_ARCHITECTURE arm64)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE static)
          set(VCPKG_CMAKE_SYSTEM_NAME Android)
          set(VCPKG_CMAKE_SYSTEM_VERSION 24)
          set(VCPKG_MAKE_BUILD_TRIPLET "--host=aarch64-linux-android")
          set(VCPKG_CMAKE_CONFIGURE_OPTIONS -DANDROID_ABI=arm64-v8a)
          EOF

          cat > stream-server/triplets/x64-android.cmake << 'EOF'
          set(VCPKG_TARGET_ARCHITECTURE x64)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE static)
          set(VCPKG_CMAKE_SYSTEM_NAME Android)
          set(VCPKG_CMAKE_SYSTEM_VERSION 24)
          set(VCPKG_MAKE_BUILD_TRIPLET "--host=x86_64-linux-android")
          set(VCPKG_CMAKE_CONFIGURE_OPTIONS -DANDROID_ABI=x86_64)
          EOF

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '84bab45d415d22042bd0b9081aea57f362da3f35'
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgJsonGlob: 'stream-server/vcpkg.json'
          runVcpkgInstall: false

      - name: Install vcpkg dependencies for arm64-android
        working-directory: stream-server
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet arm64-android \
            --x-install-root=${{ github.workspace }}/vcpkg_installed-arm64 \
            --overlay-triplets=triplets \
            --overlay-ports=vcpkg-overlays
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Install vcpkg dependencies for x64-android
        working-directory: stream-server
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-android \
            --x-install-root=${{ github.workspace }}/vcpkg_installed-x64 \
            --overlay-triplets=triplets \
            --overlay-ports=vcpkg-overlays
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Verify vcpkg OpenSSL prefixes
        run: |
          test -d "${{ github.workspace }}/vcpkg_installed-arm64/arm64-android/include/openssl"
          test -d "${{ github.workspace }}/vcpkg_installed-arm64/arm64-android/lib"
          test -d "${{ github.workspace }}/vcpkg_installed-x64/x64-android/include/openssl"
          test -d "${{ github.workspace }}/vcpkg_installed-x64/x64-android/lib"

      - name: Build arm64-v8a
        working-directory: stream-server/server
        run: cargo ndk --target aarch64-linux-android --platform 24 build --release --features libtorrent --no-default-features
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed-arm64
          VCPKGRS_TRIPLET: arm64-android
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed-arm64/arm64-android/lib/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: ${{ github.workspace }}/vcpkg_installed-arm64/arm64-android
          OPENSSL_DIR: ${{ github.workspace }}/vcpkg_installed-arm64/arm64-android

      - name: Build x86_64
        working-directory: stream-server/server
        run: cargo ndk --target x86_64-linux-android --platform 24 build --release --features libtorrent --no-default-features
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed-x64
          VCPKGRS_TRIPLET: x64-android
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed-x64/x64-android/lib/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: ${{ github.workspace }}/vcpkg_installed-x64/x64-android
          OPENSSL_DIR: ${{ github.workspace }}/vcpkg_installed-x64/x64-android

      - name: Prepare JNI libs
        run: |
          mkdir -p jniLibs/arm64-v8a jniLibs/x86_64
          cp stream-server/target/aarch64-linux-android/release/libstream_server.so jniLibs/arm64-v8a/
          cp stream-server/target/x86_64-linux-android/release/libstream_server.so jniLibs/x86_64/

      - name: Upload JNI libs
        uses: actions/upload-artifact@v4
        with:
          name: stream-server-jniLibs
          path: jniLibs/

  release:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest
    needs: build-stream-server

    env:
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download stream-server JNI libs
        uses: actions/download-artifact@v4
        with:
          name: stream-server-jniLibs
          path: app/src/main/jniLibs/

      - name: Verify JNI libs
        run: |
          ls -la app/src/main/jniLibs/
          ls -la app/src/main/jniLibs/arm64-v8a/
          ls -la app/src/main/jniLibs/x86_64/

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version_name="${GITHUB_REF_NAME#v}"
            release_tag="${GITHUB_REF_NAME}"
          else
            version_name="${{ inputs.version_name }}"
            if [[ -z "${version_name}" ]]; then
              version_name="0.1.${GITHUB_RUN_NUMBER}"
            fi
            release_tag="manual-${GITHUB_RUN_NUMBER}"
          fi

          echo "VERSION_NAME=${version_name}" >> "${GITHUB_ENV}"
          echo "VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"

      - name: Decode signing keystore
        shell: bash
        run: |
          missing=0
          for name in ANDROID_RELEASE_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required secret ${name}"
              missing=1
            fi
          done

          if [[ "${missing}" == "1" ]]; then
            exit 1
          fi

          keystore_file="${RUNNER_TEMP}/release.keystore"
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${keystore_file}"
          echo "ANDROID_KEYSTORE_FILE=${keystore_file}" >> "${GITHUB_ENV}"

      - name: Build release APK
        run: >
          ./gradlew
          :mpv-android-lib:assembleRelease
          :app:assembleRelease
          --warning-mode all
          -PVERSION_CODE=${VERSION_CODE}
          -PVERSION_NAME=${VERSION_NAME}

      - name: Prepare release assets
        shell: bash
        run: |
          rm -rf dist
          python .github/scripts/collect-apks.py \
            --metadata app/build/outputs/apk/release/output-metadata.json \
            --apk-dir app/build/outputs/apk/release \
            --output-dir dist \
            --version-name "${VERSION_NAME}" \
            --build-type release

          mapping_path="app/build/outputs/mapping/release/mapping.txt"
          if [[ -f "${mapping_path}" ]]; then
            cp "${mapping_path}" "dist/StremioMobile-v${VERSION_NAME}-mapping.txt"
          fi

      - name: Verify release assets
        shell: bash
        run: |
          test -f "dist/StremioMobile-v${VERSION_NAME}-arm64-v8a-release.apk"
          test -f "dist/StremioMobile-v${VERSION_NAME}-x86_64-release.apk"
          test -f "dist/StremioMobile-v${VERSION_NAME}-universal-release.apk"
          test -f "dist/StremioMobile-v${VERSION_NAME}-SHA256SUMS.txt"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stremio-mobile-release-${{ env.VERSION_NAME }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --title "StremioMobile ${VERSION_NAME}" \
              --notes "Automated APK release for ${VERSION_NAME}."
          fi

          gh release upload "${RELEASE_TAG}" dist/* --clobber
