name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_name:
        description: Version name to publish for a manual release
        required: false

permissions:
  contents: write

jobs:
  build-stream-server:
    name: Build Stream Server ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: armeabi-v7a
            rust-target: armv7-linux-androideabi
            vcpkg-triplet: arm-android
            vcpkg-arch: arm
            android-abi: armeabi-v7a
            make-host: armv7a-linux-androideabi
          - abi: arm64-v8a
            rust-target: aarch64-linux-android
            vcpkg-triplet: arm64-android
            vcpkg-arch: arm64
            android-abi: arm64-v8a
            make-host: aarch64-linux-android
          - abi: x86
            rust-target: i686-linux-android
            vcpkg-triplet: x86-android
            vcpkg-arch: x86
            android-abi: x86
            make-host: i686-linux-android
          - abi: x86_64
            rust-target: x86_64-linux-android
            vcpkg-triplet: x64-android
            vcpkg-arch: x64
            android-abi: x86_64
            make-host: x86_64-linux-android

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout stream-server
        uses: actions/checkout@v4
        with:
          repository: perpetus/stream-server
          path: stream-server

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL);
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN);

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: vcpkg_installed-${{ matrix.abi }}
          key: android-vcpkg-${{ matrix.vcpkg-triplet }}-${{ hashFiles('stream-server/vcpkg.json') }}
          restore-keys: |
            android-vcpkg-${{ matrix.vcpkg-triplet }}-

      - name: Create Android triplets
        run: |
          mkdir -p stream-server/triplets
          cat > stream-server/triplets/${{ matrix.vcpkg-triplet }}.cmake << 'EOF'
          set(VCPKG_TARGET_ARCHITECTURE ${{ matrix.vcpkg-arch }})
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE static)
          set(VCPKG_CMAKE_SYSTEM_NAME Android)
          set(VCPKG_CMAKE_SYSTEM_VERSION 24)
          set(VCPKG_MAKE_BUILD_TRIPLET "--host=${{ matrix.make-host }}")
          EOF

          if [[ "${{ matrix.android-abi }}" == "armeabi-v7a" ]]; then
            echo 'set(VCPKG_CMAKE_CONFIGURE_OPTIONS -DANDROID_ABI=armeabi-v7a -DANDROID_ARM_NEON=ON)' >> stream-server/triplets/${{ matrix.vcpkg-triplet }}.cmake
          else
            echo 'set(VCPKG_CMAKE_CONFIGURE_OPTIONS -DANDROID_ABI=${{ matrix.android-abi }})' >> stream-server/triplets/${{ matrix.vcpkg-triplet }}.cmake
          fi

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '84bab45d415d22042bd0b9081aea57f362da3f35'
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgJsonGlob: 'stream-server/vcpkg.json'
          runVcpkgInstall: false

      - name: Install vcpkg dependencies
        working-directory: stream-server
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet ${{ matrix.vcpkg-triplet }} \
            --x-install-root=${{ github.workspace }}/vcpkg_installed-${{ matrix.abi }} \
            --overlay-triplets=triplets \
            --overlay-ports=vcpkg-overlays
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Verify vcpkg OpenSSL prefixes
        run: |
          test -d "${{ github.workspace }}/vcpkg_installed-${{ matrix.abi }}/${{ matrix.vcpkg-triplet }}/include/openssl"
          test -d "${{ github.workspace }}/vcpkg_installed-${{ matrix.abi }}/${{ matrix.vcpkg-triplet }}/lib"

      - name: Build ${{ matrix.abi }}
        working-directory: stream-server/server
        run: cargo ndk --target ${{ matrix.rust-target }} --platform 24 build --release --features libtorrent --no-default-features
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed-${{ matrix.abi }}
          VCPKGRS_TRIPLET: ${{ matrix.vcpkg-triplet }}
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed-${{ matrix.abi }}/${{ matrix.vcpkg-triplet }}/lib/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: ${{ github.workspace }}/vcpkg_installed-${{ matrix.abi }}/${{ matrix.vcpkg-triplet }}
          OPENSSL_DIR: ${{ github.workspace }}/vcpkg_installed-${{ matrix.abi }}/${{ matrix.vcpkg-triplet }}

      - name: Prepare JNI libs
        run: |
          mkdir -p jniLibs/${{ matrix.abi }}
          cp stream-server/target/${{ matrix.rust-target }}/release/libstream_server.so jniLibs/${{ matrix.abi }}/

      - name: Upload JNI libs
        uses: actions/upload-artifact@v4
        with:
          name: stream-server-jniLibs-${{ matrix.abi }}
          path: jniLibs/

  release:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest
    needs: build-stream-server

    env:
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download stream-server JNI libs
        uses: actions/download-artifact@v4
        with:
          pattern: stream-server-jniLibs-*
          path: app/src/main/jniLibs/
          merge-multiple: true

      - name: Verify JNI libs
        run: |
          ls -la app/src/main/jniLibs/
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            test -f "app/src/main/jniLibs/${abi}/libstream_server.so"
            ls -la "app/src/main/jniLibs/${abi}/"
          done

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version_name="${GITHUB_REF_NAME#v}"
            release_tag="${GITHUB_REF_NAME}"
          else
            version_name="${{ inputs.version_name }}"
            if [[ -z "${version_name}" ]]; then
              version_name="0.1.${GITHUB_RUN_NUMBER}"
            fi
            release_tag="manual-${GITHUB_RUN_NUMBER}"
          fi

          echo "VERSION_NAME=${version_name}" >> "${GITHUB_ENV}"
          echo "VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"

      - name: Decode signing keystore
        shell: bash
        run: |
          missing=0
          for name in ANDROID_RELEASE_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required secret ${name}"
              missing=1
            fi
          done

          if [[ "${missing}" == "1" ]]; then
            exit 1
          fi

          keystore_file="${RUNNER_TEMP}/release.keystore"
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${keystore_file}"
          echo "ANDROID_KEYSTORE_FILE=${keystore_file}" >> "${GITHUB_ENV}"

      - name: Build release APK
        run: >
          ./gradlew
          :mpv-android-lib:assembleRelease
          :app:assembleRelease
          --warning-mode all
          -PVERSION_CODE=${VERSION_CODE}
          -PVERSION_NAME=${VERSION_NAME}

      - name: Prepare release assets
        shell: bash
        run: |
          rm -rf dist
          python .github/scripts/collect-apks.py \
            --metadata app/build/outputs/apk/release/output-metadata.json \
            --apk-dir app/build/outputs/apk/release \
            --output-dir dist \
            --version-name "${VERSION_NAME}" \
            --build-type release

          mapping_path="app/build/outputs/mapping/release/mapping.txt"
          if [[ -f "${mapping_path}" ]]; then
            cp "${mapping_path}" "dist/StremioMobile-v${VERSION_NAME}-mapping.txt"
          fi

      - name: Verify release assets
        shell: bash
        run: |
          test -f "dist/StremioMobile-v${VERSION_NAME}-armeabi-v7a-release.apk"
          test -f "dist/StremioMobile-v${VERSION_NAME}-arm64-v8a-release.apk"
          test -f "dist/StremioMobile-v${VERSION_NAME}-x86-release.apk"
          test -f "dist/StremioMobile-v${VERSION_NAME}-x86_64-release.apk"
          test -f "dist/StremioMobile-v${VERSION_NAME}-universal-release.apk"
          test -f "dist/StremioMobile-v${VERSION_NAME}-SHA256SUMS.txt"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stremio-mobile-release-${{ env.VERSION_NAME }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --title "StremioMobile ${VERSION_NAME}" \
              --notes "Automated APK release for ${VERSION_NAME}."
          fi

          gh release upload "${RELEASE_TAG}" dist/* --clobber
