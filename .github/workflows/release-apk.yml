name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_name:
        description: Version name to publish for a manual release
        required: false

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest

    env:
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version_name="${GITHUB_REF_NAME#v}"
            release_tag="${GITHUB_REF_NAME}"
          else
            version_name="${{ inputs.version_name }}"
            if [[ -z "${version_name}" ]]; then
              version_name="0.1.${GITHUB_RUN_NUMBER}"
            fi
            release_tag="manual-${GITHUB_RUN_NUMBER}"
          fi

          echo "VERSION_NAME=${version_name}" >> "${GITHUB_ENV}"
          echo "VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"

      - name: Decode signing keystore
        shell: bash
        run: |
          missing=0
          for name in ANDROID_RELEASE_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required secret ${name}"
              missing=1
            fi
          done

          if [[ "${missing}" == "1" ]]; then
            exit 1
          fi

          keystore_file="${RUNNER_TEMP}/release.keystore"
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${keystore_file}"
          echo "ANDROID_KEYSTORE_FILE=${keystore_file}" >> "${GITHUB_ENV}"

      - name: Build release APK
        run: >
          ./gradlew
          :mpv-android-lib:assembleRelease
          :app:assembleRelease
          --warning-mode all
          -PVERSION_CODE=${VERSION_CODE}
          -PVERSION_NAME=${VERSION_NAME}

      - name: Prepare release assets
        shell: bash
        run: |
          apk_path="$(find app/build/outputs/apk/release -name "*.apk" | sort | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            echo "::error::Release APK not found"
            exit 1
          fi

          apk_name="StremioMobile-v${VERSION_NAME}-release.apk"
          cp "${apk_path}" "${apk_name}"
          sha256sum "${apk_name}" > "${apk_name}.sha256"

          mapping_path="app/build/outputs/mapping/release/mapping.txt"
          if [[ -f "${mapping_path}" ]]; then
            cp "${mapping_path}" "StremioMobile-v${VERSION_NAME}-mapping.txt"
          fi

          {
            echo "APK_NAME=${apk_name}"
            echo "MAPPING_NAME=StremioMobile-v${VERSION_NAME}-mapping.txt"
          } >> "${GITHUB_ENV}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stremio-mobile-release-${{ env.VERSION_NAME }}
          path: |
            ${{ env.APK_NAME }}
            ${{ env.APK_NAME }}.sha256
            ${{ env.MAPPING_NAME }}
          if-no-files-found: warn

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --title "StremioMobile ${VERSION_NAME}" \
              --notes "Automated APK release for ${VERSION_NAME}."
          fi

          assets=("${APK_NAME}" "${APK_NAME}.sha256")
          if [[ -f "${MAPPING_NAME}" ]]; then
            assets+=("${MAPPING_NAME}")
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
